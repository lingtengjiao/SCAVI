name: 自动化部署到生产服务器

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: 安装前端依赖并构建
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: SSH 连接服务器并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            echo "==> 进入项目目录"
            cd /opt/scavi

            echo "==> 拉取最新代码"
            git pull origin main

            echo "==> 构建前端"
            cd frontend
            npm install
            npm run build
            cd ..

            echo "==> 更新 .env 文件（如需要）"
            # .env 文件应已预先在服务器配置好，不通过 git 管理

            echo "==> 重新构建并启动容器"
            docker compose -f docker-compose.prod.yml up -d --build

            echo "==> 等待服务健康检查"
            sleep 15

            echo "==> 验证服务状态"
            docker compose -f docker-compose.prod.yml ps

            echo "==> 检查 HTTP 响应"
            curl -sf http://localhost/health && echo "✅ 健康检查通过" || echo "⚠️ 健康检查失败，请检查日志"

            echo "==> 部署完成"
